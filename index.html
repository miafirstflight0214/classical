<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classical</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --bg-card: #111111;
  --bg-hover: #1a1a1a;
  --text: #e8e4df;
  --text-dim: #6a6560;
  --text-mid: #9a9590;
  --accent: #c9a87c;
  --accent-dim: rgba(201, 168, 124, 0.15);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  padding: 3rem 2rem 2rem;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.header h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(2.5rem, 5vw, 4rem);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 0.3rem;
}
.header .subtitle {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* CATEGORIES */
.categories {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  padding: 1.5rem 2rem;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(20px);
  z-index: 100;
}
.cat-btn {
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.5rem 1.2rem;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2rem;
  background: transparent;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.3s ease;
}
.cat-btn:hover { border-color: var(--accent); color: var(--text); }
.cat-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* PLAYLIST */
.playlist {
  max-width: 900px;
  margin: 0 auto;
  padding: 1rem 2rem 12rem;
}
.section-title {
  font-family: var(--serif);
  font-weight: 300;
  font-style: italic;
  font-size: 1.3rem;
  color: var(--text-dim);
  padding: 2rem 0 0.8rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  margin-bottom: 0.5rem;
}
.track {
  display: grid;
  grid-template-columns: 2.5rem 1fr auto;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 0.8rem;
  border-radius: 0.4rem;
  cursor: pointer;
  transition: background 0.2s ease;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.track:hover { background: var(--bg-hover); }
.track.playing { background: var(--accent-dim); }
.track.playing .track-num { color: var(--accent); }
.track-num {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: center;
}
.track.playing .track-num span { display: none; }
.track.playing .track-num::after {
  content: '';
  display: inline-block;
  width: 10px;
  height: 10px;
  border-left: 3px solid var(--accent);
  border-right: 3px solid var(--accent);
  animation: bars 0.6s ease-in-out infinite alternate;
}
@keyframes bars {
  0% { height: 6px; }
  100% { height: 14px; }
}
.track-info h3 {
  font-family: var(--sans);
  font-weight: 400;
  font-size: 0.9rem;
  color: var(--text);
  margin-bottom: 0.15rem;
}
.track-info .composer {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.8rem;
  color: var(--text-mid);
}
.track-duration {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-dim);
}

/* PLAYER BAR */
.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(17,17,17,0.97);
  backdrop-filter: blur(30px);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 0;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.player-bar.visible { transform: translateY(0); }

.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.06);
  cursor: pointer;
  position: relative;
}
.progress-bar:hover { height: 5px; }
.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.1s linear;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s;
}
.progress-bar:hover .progress-fill::after { opacity: 1; }

.player-content {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0.8rem 2rem;
  max-width: 1200px;
  margin: 0 auto;
}
.player-info {
  min-width: 0;
}
.player-info h4 {
  font-family: var(--sans);
  font-weight: 400;
  font-size: 0.85rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-info .player-composer {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--text-mid);
}

.player-controls {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.ctrl-btn {
  background: none;
  border: none;
  color: var(--text-mid);
  cursor: pointer;
  padding: 0.5rem;
  transition: color 0.2s;
  display: flex;
  align-items: center;
}
.ctrl-btn:hover { color: var(--text); }
.ctrl-btn.play-pause {
  width: 44px;
  height: 44px;
  border: 1.5px solid var(--text-mid);
  border-radius: 50%;
  justify-content: center;
  color: var(--text);
}
.ctrl-btn.play-pause:hover { border-color: var(--accent); color: var(--accent); }

.player-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0.8rem;
}
.time-display {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
}
.volume-wrap {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.volume-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 70px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  outline: none;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px;
  height: 10px;
  background: var(--text-mid);
  border-radius: 50%;
  cursor: pointer;
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-dim);
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.1rem;
}

/* LOADING */
.track.loading .track-num::after {
  content: '';
  display: inline-block;
  width: 10px;
  height: 10px;
  border: 1.5px solid var(--text-dim);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.track.loading .track-num span { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .header { padding: 2rem 1.5rem 1.5rem; }
  .categories { padding: 1rem; gap: 0.4rem; }
  .cat-btn { font-size: 0.65rem; padding: 0.4rem 0.8rem; }
  .playlist { padding: 1rem 1rem 11rem; }
  .player-content { padding: 0.8rem 1rem; grid-template-columns: 1fr auto; }
  .player-right { display: none; }
  .track { grid-template-columns: 2rem 1fr auto; gap: 0.6rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Classical</h1>
  <div class="subtitle">Public Domain Recordings</div>
</div>

<div class="categories" id="categories"></div>

<div class="playlist" id="playlist"></div>

<div class="player-bar" id="playerBar">
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="player-content">
    <div class="player-info">
      <h4 id="playerTitle">—</h4>
      <div class="player-composer" id="playerComposer">—</div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="prevBtn" title="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6V6zm3.5 6 8.5 6V6l-8.5 6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" title="Play/Pause">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" id="nextBtn" title="Next">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 18h2V6h-2v12zM6 18l8.5-6L6 6v12z"/></svg>
      </button>
    </div>
    <div class="player-right">
      <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
      <div class="volume-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-dim)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03z"/></svg>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
      </div>
    </div>
  </div>
</div>

<audio id="audio" preload="none"></audio>

<script>
const LIBRARY = [

  {

    title: 'Clair de Lune',

    duration: '6:50'
  },

    src: 'https://archive.org/download/tchaikovsky-piano-concerto-no.-1-in-b-flat-minor-op.-23-th.-55-1.-allegro-non-troppo-e.../Tchaikovsky-%20Piano%20Concerto%20No.%201%20in%20B-Flat%20Minor%2C%20Op.%2023%2C%20TH.%2055%20-%201.%20Allegro%20non%20troppo%20e....mp3',

    composer: 'Ludwig van Beethoven',

    duration: '8:20'

  // — Violin —
  {
    cat: 'Violin',
    title: 'Violin Partita No. 2 — Chaconne',
    composer: 'Johann Sebastian Bach',
    src: 'https://archive.org/download/Bach-busoniChaconne-FromPartitaForSoloViolinNo.2Bwv1004/Bach-Busoni-chaconne.mp3',
    duration: '14:30'

  },
  {

    duration: '22:00'
  },
  {
    cat: 'Violin',
    title: 'Violin Concerto — I. Allegro moderato',

  // — Waltz —
  {
    cat: 'Waltz',
    title: 'The Blue Danube',

  },
  {

    duration: '18:40'
  },

  // — Orchestral —
  {
    cat: 'Orchestral',
    title: 'Canon in D',
    composer: 'Johann Pachelbel',
    src: 'https://archive.org/download/PachelbelsCanoninD/Canon_in_D_Piano.mp3',
    duration: '5:15'
  },
  {
    cat: 'Orchestral',
    title: 'The Four Seasons — Spring, I. Allegro',
    composer: 'Antonio Vivaldi',
    src: 'https://archive.org/download/LeQuattroStagioni/01ViolinConcertoInEMajorRv269spring-I.Allegro.mp3',
    duration: '3:30'
  },
  {
    cat: 'Orchestral',
    title: 'Adagio for Strings',
    composer: 'Samuel Barber',
    src: 'https://archive.org/download/Barbers_Adagio_for_Strings/01Track1.mp3',
    duration: '8:00'
  },
  {
    cat: 'Orchestral',
    title: 'Boléro',
    composer: 'Maurice Ravel',
    src: 'https://archive.org/download/bolero_69/Bolero.mp3',
    duration: '15:30'
  },
];

// State
let currentTrack = null;
let currentIdx = -1;
let isPlaying = false;
let filteredTracks = [...LIBRARY];
let activeCategory = 'All';

const audio = document.getElementById('audio');
const playerBar = document.getElementById('playerBar');
const playPauseBtn = document.getElementById('playPauseBtn');
const playIcon = document.getElementById('playIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const playerTitle = document.getElementById('playerTitle');
const playerComposer = document.getElementById('playerComposer');
const timeDisplay = document.getElementById('timeDisplay');
const volumeSlider = document.getElementById('volumeSlider');
const playlistEl = document.getElementById('playlist');
const categoriesEl = document.getElementById('categories');

// Build categories
const cats = ['All', ...new Set(LIBRARY.map(t => t.cat))];
cats.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === 'All' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filteredTracks = cat === 'All' ? [...LIBRARY] : LIBRARY.filter(t => t.cat === cat);
    renderPlaylist();
  };
  categoriesEl.appendChild(btn);
});

function renderPlaylist() {
  playlistEl.innerHTML = '';
  let currentCat = '';
  filteredTracks.forEach((track, i) => {
    if (activeCategory === 'All' && track.cat !== currentCat) {
      currentCat = track.cat;
      const h = document.createElement('div');
      h.className = 'section-title';
      h.textContent = currentCat;
      playlistEl.appendChild(h);
    }
    const globalIdx = LIBRARY.indexOf(track);
    const el = document.createElement('div');
    el.className = 'track' + (currentIdx === globalIdx ? ' playing' : '');
    el.dataset.idx = globalIdx;
    el.innerHTML = `
      <div class="track-num"><span>${String(i + 1).padStart(2, '0')}</span></div>
      <div class="track-info">
        <h3>${track.title}</h3>
        <div class="composer">${track.composer}</div>
      </div>
      <div class="track-duration">${track.duration}</div>
    `;
    el.onclick = () => loadAndPlay(globalIdx);
    playlistEl.appendChild(el);
  });
  if (filteredTracks.length === 0) {
    playlistEl.innerHTML = '<div class="empty-state">No tracks in this category</div>';
  }
}

function loadAndPlay(idx) {
  const track = LIBRARY[idx];
  if (!track) return;
  currentIdx = idx;
  currentTrack = track;
  audio.src = track.src;
  audio.load();
  audio.play().catch(() => {});
  isPlaying = true;
  updatePlayerUI();
  renderPlaylist();
  playerBar.classList.add('visible');
}

function updatePlayerUI() {
  playerTitle.textContent = currentTrack ? currentTrack.title : '—';
  playerComposer.textContent = currentTrack ? currentTrack.composer : '—';
  playIcon.innerHTML = isPlaying
    ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

// Controls
playPauseBtn.onclick = () => {
  if (!currentTrack) return;
  if (isPlaying) { audio.pause(); } else { audio.play(); }
  isPlaying = !isPlaying;
  updatePlayerUI();
};

prevBtn.onclick = () => {
  if (currentIdx > 0) loadAndPlay(currentIdx - 1);
};

nextBtn.onclick = () => {
  if (currentIdx < LIBRARY.length - 1) loadAndPlay(currentIdx + 1);
};

audio.ontimeupdate = () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
  }
};

audio.onended = () => {
  if (currentIdx < LIBRARY.length - 1) {
    loadAndPlay(currentIdx + 1);
  } else {
    isPlaying = false;
    updatePlayerUI();
  }
};

audio.onplay = () => { isPlaying = true; updatePlayerUI(); };
audio.onpause = () => { isPlaying = false; updatePlayerUI(); };

progressBar.onclick = (e) => {
  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
};

volumeSlider.oninput = () => {
  audio.volume = parseFloat(volumeSlider.value);
};
audio.volume = 0.7;

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    playPauseBtn.click();
  }
  if (e.code === 'ArrowRight') { nextBtn.click(); }
  if (e.code === 'ArrowLeft') { prevBtn.click(); }
});

// Init
renderPlaylist();
</script>
</body>
</html>
